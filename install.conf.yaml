- defaults:
    link:
      relink: true # Removes old links even if they point to the correct target
      create: true # Create parent dirs if needed
      force: true # Remove existing file and create with a symlink

- clean: ["~"]

# Format like:
# Actual path: your dotfiles repo reference
- link:
    ~/.tmux.conf: .tmux.conf
    ~/.vimrc: .vimrc
    ~/.ideavimrc: .ideavimrc
    ~/.curlrc: .curlrc
    ~/.psqlrc: .psqlrc
    ~/.wgetrc: .wgetrc
    ~/.p10k.zsh: .p10k.zsh
    ~/.gitconfig: .gitconfig
    ~/.zshrc: .zshrc
    ~/.config/fish: configs/fish
    ~/.zprofile: .zprofile
    ~/.config/gh: configs/gh
    ~/.config/zsh: configs/zsh
    ~/.config/cvim: configs/cvim
    ~/.config/ghostty: configs/ghostty
    ~/.config/atuin: configs/atuin
    ~/.config/pgcli: configs/pgcli
    ~/.config/htop: configs/htop
    ~/.config/btop: configs/btop
    ~/.config/mpv: configs/mpv
    ~/.config/zed: configs/zed
    ~/.config/opencode/opencode.json: configs/opencode/opencode.json
    ~/.codex/config.toml: configs/codex/config.toml
    ~/.codex/AGENTS.md: configs/agents/AGENTS.md
    ~/.config/opencode/AGENTS.md: configs/agents/AGENTS.md
    ~/.claude/CLAUDE.md: configs/agents/AGENTS.md
    ~/.claude/:
      glob: true
      path: configs/claude/*
    ~/.claude/skills: configs/agents/skills
    ~/.agents/.skill-lock.json: configs/agents/.skill-lock.json
    ~/.agents/skills: configs/agents/skills
    ~/.local/bin/:
      glob: true
      path: scripts/*/*
    # ~/Library/Preferences/com.googlecode.iterm2.plist: configs/iterm2/com.googlecode.iterm2.plist

    "~/Library/Application Support/Code/User/settings.json": configs/vscode/settings.json
    "~/Library/Application Support/Code/User/keybindings.json": configs/vscode/keybindings.json

    "~/Library/Application Support/Cursor/User/settings.json": configs/cursor/settings.json
    "~/Library/Application Support/Cursor/User/keybindings.json": configs/cursor/keybindings.json

    # Pi Coding Agent
    ~/.pi/agent/settings.json: configs/pi/settings.json
    ~/.pi/agent/keybindings.json: configs/pi/keybindings.json
    ~/.pi/agent/APPEND_SYSTEM.md: configs/pi/APPEND_SYSTEM.md
    ~/.pi/agent/mcp.json.disabled: configs/pi/mcp.json.disabled
    ~/.pi/agent/extensions: configs/pi/extensions
    ~/.pi/agent/themes: configs/pi/themes
    ~/.pi/agent/npm/package.json: configs/pi/npm/package.json
    ~/.pi/agent/npm/package-lock.json: configs/pi/npm/package-lock.json
    ~/.pi/agent/damage-control-rules.yaml: configs/pi/damage-control-rules.yaml
    ~/.config/mcp/mcp.json: configs/mcp/mcp.json

- shell:
    - [git submodule update --init --recursive, Installing submodules]
