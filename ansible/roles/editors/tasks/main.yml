---
- name: Check if VSCode is installed
  ansible.builtin.command:
    cmd: which code
  register: code_check
  ignore_errors: true
  changed_when: false

- name: Read VSCode extensions from file
  ansible.builtin.set_fact:
    vscode_extensions: "{{ lookup('file', dotfiles_repo + '/configs/vscode/extensions.txt').splitlines() | reject('==', '') | list }}"
  when: code_check.rc == 0

- name: Install VSCode extensions
  ansible.builtin.command:
    cmd: "code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  when: code_check.rc == 0
  ignore_errors: true
  changed_when: false

- name: Check if Cursor is installed
  ansible.builtin.command:
    cmd: which cursor
  register: cursor_check
  ignore_errors: true
  changed_when: false

- name: Read Cursor extensions from file
  ansible.builtin.set_fact:
    cursor_extensions: "{{ lookup('file', dotfiles_repo + '/configs/cursor/extensions.txt').splitlines() | reject('==', '') | list }}"
  when: cursor_check.rc == 0

- name: Install Cursor extensions
  ansible.builtin.command:
    cmd: "cursor --install-extension {{ item }}"
  loop: "{{ cursor_extensions }}"
  when: cursor_check.rc == 0
  ignore_errors: true
  changed_when: false

- name: Read Zed extensions from file
  ansible.builtin.set_fact:
    zed_extensions: "{{ lookup('file', dotfiles_repo + '/configs/zed/extensions.txt').splitlines() | reject('==', '') | list }}"

- name: Configure Zed extension auto-install
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_repo }}/configs/zed/settings.json"
    marker: "    // {mark} ANSIBLE MANAGED ZED EXTENSIONS"
    insertafter: "^{"
    block: |2
          "auto_install_extensions": {{ dict(zed_extensions | zip([true] * (zed_extensions | length))) | to_nice_json(indent=4) | indent(4, false) }},
  when: zed_extensions | length > 0

- name: Display extension installation summary
  ansible.builtin.debug:
    msg: "VSCode and/or Cursor extensions installed; Zed extensions configured for auto-install on startup. Some may have failed (deprecated extensions)."
