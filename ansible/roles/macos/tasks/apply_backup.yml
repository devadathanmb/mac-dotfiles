---
- name: Resolve macOS defaults backup file
  ansible.builtin.set_fact:
    macos_defaults_resolved_file: >-
      {{ macos_defaults_file if macos_defaults_file.startswith('/') else dotfiles_repo ~ '/' ~ macos_defaults_file }}

- name: Load macOS defaults backup
  ansible.builtin.include_vars:
    file: "{{ macos_defaults_resolved_file }}"

- name: Validate macOS defaults backup
  ansible.builtin.assert:
    that:
      - macos_defaults is defined
      - macos_defaults is iterable
    fail_msg: "{{ macos_defaults_resolved_file }} must define a macos_defaults list."

- name: Apply present macOS defaults from backup
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    host: "{{ item.host | default(omit) }}"
    state: present
  become: "{{ item.become | default(false) }}"
  loop: "{{ macos_defaults }}"
  loop_control:
    label: "{{ item.name | default(item.domain ~ ' ' ~ item.key) }}"
  when:
    - item.state | default('present') == 'present'
    - item.type | default('') != 'plist'
  notify:
    - Restart Dock
    - Restart Finder
    - Restart SystemUIServer

- name: Read current plist macOS defaults before applying backup
  ansible.builtin.command:
    argv: >-
      {{
        ['defaults']
        + (['-currentHost'] if item.host | default('') == 'currentHost' else [])
        + ['read', item.domain, item.key]
      }}
  become: "{{ item.become | default(false) }}"
  loop: "{{ macos_defaults }}"
  loop_control:
    label: "{{ item.name | default(item.domain ~ ' ' ~ item.key) }}"
  register: plist_macos_defaults
  changed_when: false
  failed_when: false
  when:
    - item.state | default('present') == 'present'
    - item.type | default('') == 'plist'

- name: Apply present plist macOS defaults from backup
  ansible.builtin.command:
    argv: >-
      {{
        ['defaults']
        + (['-currentHost'] if item.item.host | default('') == 'currentHost' else [])
        + ['write', item.item.domain, item.item.key, item.item.value | string]
      }}
  become: "{{ item.item.become | default(false) }}"
  loop: "{{ plist_macos_defaults.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name | default(item.item.domain ~ ' ' ~ item.item.key) }}"
  when:
    - not item.skipped | default(false)
    - item.rc != 0 or item.stdout | trim != item.item.value | string | trim
  notify:
    - Restart Dock
    - Restart Finder
    - Restart SystemUIServer

- name: Remove absent macOS defaults from backup
  community.general.osx_defaults:
    domain: "{{ item.domain }}"
    key: "{{ item.key }}"
    host: "{{ item.host | default(omit) }}"
    state: absent
  become: "{{ item.become | default(false) }}"
  loop: "{{ macos_defaults }}"
  loop_control:
    label: "{{ item.name | default(item.domain ~ ' ' ~ item.key) }}"
  when: item.state | default('present') == 'absent'
  notify:
    - Restart Dock
    - Restart Finder
    - Restart SystemUIServer
