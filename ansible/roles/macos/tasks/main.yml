# ==============================================================================
# SCREENSHOT SETTINGS
# ==============================================================================

- name: Screenshots | Create Screenshots directory
  tags: [macos]
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Pictures/Screenshots"
    state: directory
    mode: '0755'

- name: Screenshots | Save screenshots to Screenshots folder
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ ansible_facts['env']['HOME'] }}/Pictures/Screenshots"

- name: Screenshots | Save screenshots in PNG format
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: type
    type: string
    value: png

- name: Screenshots | Disable shadow in screenshots
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: disable-shadow
    type: bool
    value: true

# ==============================================================================
# SECURITY SETTINGS
# ==============================================================================

# NOTE: defaults write to com.apple.screensaver for askForPassword/askForPasswordDelay
# has been broken since macOS 10.13.4 — Apple moved this into a separate security
# framework. Use sysadminctl or an MDM profile instead:
#   sudo sysadminctl -screenLock immediate -adminUser <user> -adminPassword <pass>
- name: Security | Require password immediately after sleep
  tags: [macos]
  ansible.builtin.command:
    cmd: sysadminctl -screenLock immediate
  become: true
  changed_when: false
  ignore_errors: true

# ==============================================================================
# PERFORMANCE SETTINGS
# ==============================================================================

- name: Performance | Disable automatic termination of inactive apps
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSDisableAutomaticTermination
    type: bool
    value: true

