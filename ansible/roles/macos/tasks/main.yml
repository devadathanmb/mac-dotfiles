# ==============================================================================
# DOCK SETTINGS
# ==============================================================================

- name: Dock | Auto-hide Dock
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true
  notify: Restart Dock

- name: Dock | Disable click wallpaper to show desktop (Sonoma+)
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.WindowManager
    key: EnableStandardClickToShowDesktop
    type: bool
    value: false

- name: Dock | Change minimize/maximize window effect to scale
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mineffect
    type: string
    value: scale
  notify: Restart Dock

- name: Dock | Minimize windows into their application icon
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: true
  notify: Restart Dock

- name: Dock | Show indicator lights for open applications
  tags: [macos]
  community.general.osx_defaults:
    domain: com.apple.dock
    key: show-process-indicators
