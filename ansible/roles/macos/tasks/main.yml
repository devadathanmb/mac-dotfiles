    value: 1

- name: Keyboard | Set fast initial key repeat
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 10

- name: Keyboard | Disable press and hold for key repeat
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false

- name: Keyboard | Enable automatic capitalization
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticCapitalizationEnabled
    type: bool
    value: true

- name: Keyboard | Enable automatic period substitution
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: true

- name: Keyboard | Disable smart quotes
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false

- name: Keyboard | Disable smart dashes
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false

- name: Keyboard | Enable full keyboard access for all controls
  tags: [macos]
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
